<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Vibrant multi-color gradient -->
    <linearGradient id="vibrantGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="25%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#EC4899"/>
      <stop offset="75%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    
    <!-- Sparkle glow filter -->
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  
  <!-- Main circle with vibrant gradient -->
  <circle cx="50" cy="50" r="45" fill="url(#vibrantGrad)"/>
  
  <!-- Inner glow -->
  <circle cx="50" cy="50" r="45" fill="url(#innerGlow)"/>
  
  <!-- Z letter with white gradient -->
  <text 
    x="50" 
    y="68" 
    font-size="48" 
    text-anchor="middle" 
    fill="white" 
    font-family="Arial, sans-serif" 
    font-weight="700"
  >
    Z
  </text>
  
  <!-- Sparkle/Star for AI feel with glow -->
  <path 
    d="M72 22 L78 16 M75 14 L75 24 M68 19 L82 19" 
    stroke="white" 
    stroke-width="2.5" 
    stroke-linecap="round"
    filter="url(#sparkleGlow)"
    opacity="0.9"
  />
  
  <!-- Additional small sparkle dots -->
  <circle cx="28" cy="22" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="82" cy="35" r="2" fill="white" opacity="0.4"/>
  <circle cx="18" cy="50" r="1.5" fill="white" opacity="0.3"/>
</svg>